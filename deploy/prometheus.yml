global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'video-platform-go'
    static_configs:
      - targets: ['video-platform-go-service:8080']
    metrics_path: /metrics

  - job_name: 'video-platform-java'
    static_configs:
      - targets: ['video-platform-java-service:8081']
    metrics_path: /actuator/prometheus

  - job_name: 'video-platform-rust'
    static_configs:
      - targets: ['video-platform-rust-service:8082']
    metrics_path: /metrics

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-jmx-exporter:9999']
