server:
  name string `yaml:"server:
  name: video-platform
  host: 0.0.0.0
  port: 8080
  read_timeout: 30s
    write_timeout: 30s
    idle_timeout: 60s
    mode: debug
    metrics:
      enabled: true
      path: /metrics
      port: 9090

database:
  driver: postgres
  host: postgres
  port: 5432
  user: postgres
  password: postgres
  database: video_platform
  ssl_mode: disable
  max_open_conns: 100
    max_idle_conns: 10
    conn_max_lifetime: 1h
    conn_max_idle_time: 10m

redis:
  addr: localhost:6379
  password: ""
  db: 0
  pool_size: 100
  min_idle_conns: 10

storage:
  provider: minio
  endpoint: localhost:9000
  region: us-east-1
  bucket: video-platform
  access_key: minioadmin
  secretKey: miniosecret
  use_ssl: false

jwt:
  secret: your-super-secret-key-at-least-32-characters
  access_token_ttl: 15m
  refresh_token_ttl: 168h
  issuer: video-platform

kafka:
  brokers:
    - localhost:9092
  group_id: video-platform
  topics:
    video_upload: video.upload.completed
    video_transcode: video.transcode.completed
    video_audit: video.audit.result
    user_action: user.action.playback
    notification: notification.send
    interaction: user.interaction

log:
  level: info
  format: json
  output: stdout
  max_size: 100
    max_backups: 3
    max_age: 7
    compress: false

metrics:
  enabled: true
  path: /metrics
  port: 9090

tracing:
  enabled: false
  endpoint: localhost:4317
  sampler: 0.1
